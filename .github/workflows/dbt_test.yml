name: dbt — Validate & Test

on:
  pull_request:
    paths: ["dbt/**"]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run dbt deps    --project-dir dbt --profiles-dir dbt
      # dbt parse: validates Jinja, refs, and schema YAML without an AWS connection.
      # dbt compile/run require the Athena adapter to call sts:GetCallerIdentity even
      # with no models selected, so they fail without credentials.
      - run: uv run dbt parse   --project-dir dbt --profiles-dir dbt
      # Full dbt run + test requires AWS creds — skip in CI until OIDC is wired up
      # - run: uv run dbt run  --project-dir dbt --profiles-dir dbt
      # - run: uv run dbt test --project-dir dbt --profiles-dir dbt
