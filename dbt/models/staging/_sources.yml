version: 2

sources:
  - name: silver
    database: awsdatacatalog
    schema: agro_silver
    tables:
      - name: indec_exports
        description: INDEC export records with FOB values in USD
        columns:
          - name: year
            tests:
              - not_null
          - name: province
            tests:
              - not_null
          - name: country
            tests:
              - not_null
          - name: commodity
            tests:
              - not_null
          - name: fob_usd
            tests:
              - not_null

      - name: senasa_certs
        description: SENASA phytosanitary certificates with destination countries
        columns:
          - name: year
            tests:
              - not_null
          - name: provincia
            tests:
              - not_null
          - name: pais_destino
            tests:
              - not_null
          - name: mercaderia_certificada
            tests:
              - not_null
          - name: toneladas
            tests:
              - not_null

      - name: worldbank_indicators
        description: World Bank commodity price indicators
        columns:
          - name: indicator_code
            tests:
              - not_null
          - name: country_code
            tests:
              - not_null
          - name: year
            tests:
              - not_null
          - name: value
            tests:
              - not_null

      - name: weather_daily_readings
        description: Daily weather readings by province
        columns:
          - name: date
            tests:
              - not_null
          - name: province
            tests:
              - not_null
          - name: station_id
            tests:
              - not_null
